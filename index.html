<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Assistant</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #eceff1; /* Világosszürke háttér, jól mutat a logóval */
        }
        .ha-link img {
            max-width: 300px; /* A kép szélessége (igény szerint módosíthatod) */
            height: auto;
            transition: transform 0.2s; /* Finom animáció rámutatáskor */
        }
        .ha-link img:hover {
            transform: scale(1.05); /* Kicsit megnő, ha ráviszed az egeret */
        }
    </style>
</head>
<body>

    <!-- A link és a kép összekapcsolása -->
    <a class="ha-link" href="http://poros.freeddns.org:8123/dashboard-haz/default_view" target="_blank">
        <img src="https://home-assistant.io" alt="Home Assistant">
    </a>

</body>
</html>
