<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feltöltés alatt</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .container {
            padding: 20px;
            max-width: 500px;
        }
        .gear-icon {
            font-size: 64px;
            margin-bottom: 20px;
            animation: spin 4s linear infinite;
            display: inline-block;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        p {
            font-size: 1.1rem;
            color: #e0e0e0;
            line-height: 1.6;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            p { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Fogaskerék emoji, ami finoman forog a háttérben -->
        <div class="gear-icon">⚙️</div>
        <h1>Feltöltés alatt</h1>
        <p>A weboldal szerkesztés alatt áll. Kérjük, látogasson vissza később!</p>
    </div>

</body>
</html>
