<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Assistant</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #03a9f4; /* Világos kék háttér */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
        }
        .card {
            background-color: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 150px;
            height: 150px;
        }
        .card svg {
            width: 110px;
            height: 110px;
        }
        .card:hover {
            transform: scale(1.08);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.4);
        }
        .text-label {
            color: white;
            font-size: 22px;
            font-weight: bold;
            margin-top: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <!-- Kattintható teljes doboz (Kép + Felirat) -->
    <a class="container" href="http://freeddns.org" target="_blank">
        
        <!-- Fehér kiemelkedő keret a beágyazott ikonnal -->
        <div class="card">
            <svg viewBox="0 0 24 24">
                <path fill="#03a9f4" d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4M12,6L6,11V18H10V14H14V18H18V11L12,6M12,8.25L16,11.57V16H14V12H10V16H8V11.57L12,8.25Z" />
            </svg>
        </div>
        
        <!-- Alsó szöveges felirat -->
        <div class="text-label">Home Assistant belépés</div>
        
    </a>

</body>
</html>
